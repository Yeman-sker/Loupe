<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Loupe</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #fff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      p {
        margin: 0 0 12px;
        color: #475569;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        padding: 9px 10px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }
      button:disabled {
        cursor: default;
        opacity: .65;
      }
      #status {
        margin-top: 10px;
        min-height: 18px;
        color: #334155;
      }
      #status[data-error="true"] {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <h1>Loupe</h1>
    <p>Authorize Loupe on the current page, then use Option+L.</p>
    <button id="authorize" type="button">Authorize current site</button>
    <div id="status" role="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
